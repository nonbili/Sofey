name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Set Build Tool Version and App Version
        shell: bash
        run: |
          BUILD_TOOL_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | tail -n 1)
          echo "BUILD_TOOL_VERSION=$BUILD_TOOL_VERSION" >> $GITHUB_ENV
          
          # Use tag name if available, otherwise fallback to build.gradle.kts
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION_NAME=${GITHUB_REF#refs/tags/v}
          else
            VERSION_NAME=$(grep 'versionName =' app/build.gradle.kts | awk -F'\"' '{print $2}')
          fi
          
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "Build Tool Version: $BUILD_TOOL_VERSION"
          echo "Version Name: $VERSION_NAME"

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.APK_SIGNING_KEY }}
          alias: ${{ secrets.APK_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.APK_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.APK_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: ${{ env.BUILD_TOOL_VERSION }}

      - name: Rename APK
        run: |
          cd app/build/outputs/apk/release
          # r0adkll/sign-android-release appends -signed.apk to the filename
          SIGNED_APK=$(ls *-signed.apk | head -n 1)
          mv "$SIGNED_APK" sofey-${{ env.VERSION_NAME }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/sofey-${{ env.VERSION_NAME }}.apk
          generate_release_notes: true
